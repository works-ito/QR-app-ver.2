<style>

}

  25% { border-color:#00ff00; filter:drop-shadow(0 0 12px #00ff00); }

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbztguQj2mLmDPaddFF_upjvGOqlIUqXNcdvr3ILbORFbrJYQmm6Hopc_uPRNPEGofJ-0Q/exec";

let stream = null;
let codeReader = null;
let selectedDeviceId = null;
let scanning = false;
let scanBusy = false;

let scannedSet = new Set();
let scannedRecords = [];
let lastScanned = "";
let lastScannedRecord = null;
let lastItemForMemo = null;

let loadingTimer = null;
let loadingDots = 0;
let batchLoadingTimer = null;
let batchLoadingDots = 0;
let initialLoadingTimer = null;
let initialLoadingDots = 0;

let pendingReturnItems = [];
let pendingReturnCaseId = "";
let pendingReturnMemoType = "";
let pendingReturnMemo = "";
let returnQrMode = "";

let pendingRecRecords = [];
let pendingRecMemoType = "";
let pendingRecMemo = "";

let lastShipmentPhotoInfo = null;
let selectedShipmentPhotos = [];
let lastReturnPhotoInfo = null;
let selectedReturnPhotos = [];
let lastSentLogIds = [];
let lastPendingSendId = "";
let pendingQuantityItem = null;
let lastQuantityCode = "";
let lastQuantityCompletedAt = 0;
// ===== ver.2 起動時一括取得データ =====

let appInitialDataLoaded = false;
let appInitialDataLoading = false;
let appInitialDataError = "";

let individualItems = [];
let simpleItems = [];
let recItems = [];
let quantityItems = [];

// QR・管理ID・品目コードから即検索するための索引
let individualItemMap = new Map();
let simpleItemMap = new Map();
let recItemMap = new Map();
let quantityItemMap = new Map();
const SCAN_INTERVAL = 120;
const CROP_RATIO = 0.55;
const FAST_MODES = [
  "出庫",
  "出庫取消",
  "返却",
  "修理中",
  "完成機",
  "拠点移動"
];
const REC_MODES = ["校正中", "校正完了", "交換完了"];
const AUTO_RELOAD_MINUTES = 30;
const DATA_REFRESH_MINUTES = 15;

let lastHiddenTime = null;
let inventoryRefreshTimer = null;

function isFastMode() {
  return FAST_MODES.includes(document.getElementById("mode").value);
}

function isRecMode() {
  return REC_MODES.includes(document.getElementById("mode").value);
}
/**
 * 現在状態と選択中の作業区分から、
 * ローカルで状態遷移を判定する。
 */
function validateStateTransition(currentState, mode) {
  const state = String(currentState || "").trim();
  const action = String(mode || "").trim();

  /*
   * 状態が取得できない機械は、現段階では止めない。
   * マスタ・状況データの未整備で現場作業が止まるのを防ぐ。
   */
  if (!state) {
    return {
      ok: true,
      warning: true,
      message: "現在状態を取得できませんでした"
    };
  }

  /*
   * 出庫
   *
   * ワークスでは出庫前点検を必ず行うため、
   * 未点検・修理中からでも出庫登録を許可する。
   * 二重出庫だけは必ず停止する。
   */
  if (action === "出庫") {
    if (state === "出庫" || state === "出庫中") {
      return {
        ok: false,
        warning: false,
        message:
          "この機械はすでに出庫中です。\n" +
          "二重出庫の可能性があるため登録できません。"
      };
    }

    return {
      ok: true,
      warning: false,
      message: ""
    };
  }

  /*
   * 返却
   *
   * 出庫中の機械だけ返却を受け付ける。
   */
  if (action === "返却") {
    if (state !== "出庫" && state !== "出庫中") {
      return {
        ok: false,
        warning: false,
        message:
          "この機械は出庫中ではありません。\n" +
          "現在状態が「" + state + "」のため返却登録できません。"
      };
    }

    return {
      ok: true,
      warning: false,
      message: ""
    };
  }

  /*
   * 出庫取消
   *
   * 現在状態が出庫中の場合だけ受け付ける。
   */
  if (action === "出庫取消") {
    if (state !== "出庫" && state !== "出庫中") {
      return {
        ok: false,
        warning: false,
        message:
          "この機械は出庫中ではありません。\n" +
          "現在状態が「" + state + "」のため出庫取消できません。"
      };
    }

    return {
      ok: true,
      warning: false,
      message: ""
    };
  }

  /*
   * 修理中・完成機・拠点移動・REC処理は、
   * まずは既存運用を優先して許可する。
   */
  return {
    ok: true,
    warning: false,
    message: ""
  };
}
function log(msg) {
  document.getElementById("status").innerText = msg;
}
/**
 * ver.2
 * アプリ起動時に4シートの現在データを一括取得する
 *
 * 現段階では、取得失敗しても既存アプリの動作を止めない。
 */
async function loadAppInitialData(showLoading = true) {
  if (appInitialDataLoading) return false;

  appInitialDataLoading = true;
  appInitialDataError = "";

  if (showLoading) {
    appInitialDataLoaded = false;
    startInitialDataLoading("最新在庫データ取得中");
  }

  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
        action: "getAppInitialData"
      })
    });

    const text = await response.text();

    let result;

    try {
      result = JSON.parse(text);
    } catch (parseError) {
      throw new Error(
        "初期データの解析に失敗しました\n" +
        text.slice(0, 200)
      );
    }

    /*
     * GAS側の返却形式が
     * success: true
     * または
     * ok: true
     * のどちらでも受け取れるようにする
     */
    if (!result.success && !result.ok) {
      throw new Error(
        result.error ||
        result.message ||
        "初期データを取得できませんでした"
      );
    }

    individualItems = Array.isArray(result.individualItems)
      ? result.individualItems
      : [];

    simpleItems = Array.isArray(result.simpleItems)
      ? result.simpleItems
      : [];

    recItems = Array.isArray(result.recItems)
      ? result.recItems
      : [];

    quantityItems = Array.isArray(result.quantityItems)
      ? result.quantityItems
      : [];

    buildAppInitialDataMaps();

    appInitialDataLoaded = true;
    appInitialDataError = "";

    console.log("起動時一括取得完了", {
      individual: individualItems.length,
      simple: simpleItems.length,
      rec: recItems.length,
      quantity: quantityItems.length
    });
if (showLoading) {
  stopInitialDataLoading();

  log(
    "在庫データ確認完了\n" +
    "QRを読み取ってください"
  );
}

    return true;

  } catch (error) {
    /*
 * 初回取得に失敗した場合だけ未取得扱いにする。
 * 定期更新・送信後更新に失敗した場合は、
 * それまで保持していたローカルデータを使用し続ける。
 */
if (showLoading) {
  appInitialDataLoaded = false;
}
    appInitialDataError = String(
      error && error.message
        ? error.message
        : error
    );

    console.error("loadAppInitialData error:", error);

    /*
     * 月曜日にGAS側を実装するまで、ここへ入る。
     * 既存アプリはそのまま使用可能。
     */
　　if (showLoading) {
  stopInitialDataLoading();

  log(
    "現在状態の一括取得に失敗しました\n" +
    "既存データで起動します"
  );
}

    return false;

  } finally {
    appInitialDataLoading = false;
  }
}

  function startInventoryRefreshTimer() {
  if (inventoryRefreshTimer) {
    clearInterval(inventoryRefreshTimer);
  }

  inventoryRefreshTimer = setInterval(async function() {
    console.log("在庫データ定期更新開始");

    const success = await loadAppInitialData(false);

    if (success) {
      console.log(
        "在庫データ定期更新完了",
        new Date().toLocaleString()
      );
    } else {
      console.log(
        "在庫データ定期更新失敗",
        new Date().toLocaleString()
      );
    }

  }, DATA_REFRESH_MINUTES * 60 * 1000);
}
/**
 * 送信成功後に最新の在庫状態を再取得する。
 *
 * 取得失敗時も送信自体は成功済みなので、
 * エラー表示で作業を止めず、現在保持しているデータを使い続ける。
 */
async function refreshInventoryAfterSend() {
  const success = await loadAppInitialData(false);

  if (success) {
    console.log(
      "送信後の在庫データ更新完了",
      new Date().toLocaleString()
    );
  } else {
    console.warn(
      "送信後の在庫データ更新失敗：現在のキャッシュを継続使用",
      new Date().toLocaleString()
    );
  }

  return success;
}
/**
 * 取得した配列から検索用Mapを作成する
 */
function buildAppInitialDataMaps() {
  individualItemMap = createManagedItemMap(individualItems);
simpleItemMap = createManagedItemMap(simpleItems);
recItemMap = createManagedItemMap(recItems);

  quantityItemMap = createItemMap(
    quantityItems,

      "品目コード",

    ]

/**
 * 見出し名の候補から検索キーを取得し、Mapへ変換する
 */
function createItemMap(items, keyCandidates) {
  const map = new Map();

  items.forEach(function(item) {
    const key = getFirstItemValue(item, keyCandidates);

    if (!key) return;

    const normalizedKey = normalizeLookupKey(key);

    if (!normalizedKey) return;

    map.set(normalizedKey, item);
  });

  return map;
}
function createManagedItemMap(items) {
  const map = new Map();

  items.forEach(function(item) {
    if (!item || typeof item !== "object") return;

    let managedId = getFirstItemValue(item, [
      "管理ID",
      "管理ＩＤ",
      "管理Id",
      "管理id",
      "管理番号",
      "QR",
      "qr",
      "id"
    ]);

    /*
     * 見出し名で取得できなかった場合、
     * オブジェクト内から管理ID形式の値を探す。
     */
    if (!managedId) {
      const values = Object.values(item);

      for (let i = 0; i < values.length; i++) {
        const value = String(values[i] || "").trim();

        if (isManagedId(value)) {
          managedId = value;
          break;
        }
      }
    }

    const normalizedKey = normalizeLookupKey(managedId);

    if (!normalizedKey) return;

    map.set(normalizedKey, item);
  });

  return map;
}

/**
 * 複数の見出し候補から最初に見つかった値を返す
 */
function getFirstItemValue(item, keyCandidates) {
  if (!item || typeof item !== "object") return "";

  for (let i = 0; i < keyCandidates.length; i++) {
    const key = keyCandidates[i];

    if (
      Object.prototype.hasOwnProperty.call(item, key) &&
      item[key] !== null &&
      item[key] !== undefined &&
      String(item[key]).trim() !== ""
    ) {
      return String(item[key]).trim();
    }
  }

  return "";
}


/**
 * QR検索用のキーを統一する
 */
function normalizeLookupKey(value) {
  return String(value || "")
    .normalize("NFKC")
    .trim()
    .replace(/[‐-‒–—―ー−]/g, "-")
    .replace(/\s+/g, "")
    .toLowerCase();
}


/**
 * 個体・簡易個体・RECを一括検索する
 */
function findManagedItemLocal(qrText) {
  const key = normalizeLookupKey(qrText);

  if (!key) return null;

  if (individualItemMap.has(key)) {
    return {
      managementType: "individual",
      item: individualItemMap.get(key)
    };
  }

  if (simpleItemMap.has(key)) {
    return {
      managementType: "simple",
      item: simpleItemMap.get(key)
    };
  }

  if (recItemMap.has(key)) {
    return {
      managementType: "rec",
      item: recItemMap.get(key)
    };
  }

  return null;
}


/**
 * 数量管理品マスタをローカル検索する
 */
function findQuantityItemLocal(itemCode) {
  const key = normalizeLookupKey(itemCode);

  if (!key) return null;

  return quantityItemMap.get(key) || null;
}

function checkAppVersion() {
  fetch("./version.json?t=" + Date.now(), { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      if (currentVersion === null) {
        currentVersion = data.version;
        return;
      }

      if (data.version !== currentVersion) {
        
        currentVersion = data.version;
        
        if (scannedRecords.length > 0) {
          pendingAutoReload = true;
          return;
        }

        location.href = location.pathname + "?v=" + Date.now();
      }
    })
    .catch(console.error);
}
  async function checkAppVersionNow() {

    const data = await response.json();

function formatDateYYYYMMDD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + d;
}

function playBeep(type) {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = type === "success" ? 1600 : 220;
    gain.gain.value = 0.8;
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {
    console.log(e);
  }
}

async function startQr() {
  if (document.getElementById("mode").value === "返却" && returnQrMode === "") {
    alert("先に返却方法を選択してください");
    document.getElementById("returnMethodArea").style.display = "block";
    scrollToElement("returnMethodArea");
    return;
  }

  if (document.getElementById("mode").value === "返却" && returnQrMode === "QRなし") {
    alert("QRなし返却ではカメラ起動は不要です");
    return;
  }

  const isLatest = await checkAppVersionNow();

  if (!isLatest) {
    return;
  }

  log("カメラ起動中...");

  if (scanning) {
    log("すでに起動中");
    return;
  }

  try {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX
    ]);

    codeReader = new ZXing.BrowserMultiFormatReader(hints);
    const devices = await codeReader.listVideoInputDevices();

    if (!devices || devices.length === 0) throw new Error("カメラが見つかりません");

    const backCamera = devices.find(function(device) {
      const label = (device.label || "").toLowerCase();
      return label.includes("back") || label.includes("rear") || label.includes("environment") || label.includes("背面");
    });

    selectedDeviceId = backCamera ? backCamera.deviceId : devices[devices.length - 1].deviceId;

    codeReader.decodeFromVideoDevice(selectedDeviceId, "video", function(result, err) {
      if (result) handleDecoded(result.getText());
    });

    scanning = true;
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";
    document.getElementById("resetBtn").style.display = "block";

    setTimeout(function() {
      document.getElementById("cameraBox").scrollIntoView({ behavior: "smooth", block: "start" });
    }, 300);

    setTimeout(applyCameraZoomOnly, 500);
    setTimeout(applyCameraZoomOnly, 1200);
    setTimeout(applyCameraZoomOnly, 2000);

    log("カメラ起動成功\nQR / Data Matrix 対応\nズーム1.8倍・ライトなし");

  } catch(err) {
    log("カメラ起動失敗\n" + err);
    scanning = false;
    scanBusy = false;

    if (stream) {
      stream.getTracks().forEach(function(track) { track.stop(); });
      stream = null;
    }

    if (codeReader) {
      try { codeReader.reset(); } catch(e) {}
      codeReader = null;
    }
  }
}

async function applyCameraZoomOnly() {
  try {
    const video = document.getElementById("video");
    const s = video.srcObject;
    if (!s) return;
    stream = s;
    const track = s.getVideoTracks()[0];
    if (!track) return;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      await track.applyConstraints({ advanced: [{ zoom: Math.min(1.8, caps.zoom.max) }] });
    }
    try {
      await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
    } catch(e) {
      console.log("focusMode未対応", e);
    }
  } catch(e) {
    console.log("zoom設定未対応", e);
  }
}

function isManagedId(text) {
  text = String(text).trim();

  // 個体管理・簡易個体管理：
  // 機種コード-3桁 または 機種コード-4桁
  return /^[A-Za-z0-9]+-\d{3,4}$/.test(text);
}

function isQuantityItemCode(text) {
  text = String(text).trim();

  // 数量管理品コード：
  // ハイフンなしの英数字
  return /^[A-Za-z0-9]{2,30}$/.test(text);
}

function isValidQrText(text) {
  text = String(text).trim();

  // 旧Googleフォーム形式を維持
  if (text.includes("entry.") && text.includes("=")) return true;

  if (isManagedId(text)) return true;
  if (isQuantityItemCode(text)) return true;

  return false;
}

function handleDecoded(decodedText) {
  decodedText = String(decodedText).trim();

  if (scanBusy) return;

  if (!isValidQrText(decodedText)) {
    log("対応形式ではないため無視しました\n" + decodedText);
    return;

 // 管理番号形式ではない英数字コードは数量管理品候補

  !isManagedId(decodedText)

  // 数量追加直後に同じQRを再読取するのを防止
  if (
    decodedText.toLowerCase() === lastQuantityCode.toLowerCase() &&
    now - lastQuantityCompletedAt < 2000
  ) {
    return;
  }

  acknowledgeQrRead(decodedText);

  // その後にGASへ問い合わせ

function stopQr() {
  if (!scanning) {
    log("まだ起動していません");
    return;
  }

  scanning = false;
  scanBusy = false;

  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }

  const video = document.getElementById("video");
  video.pause();
  video.srcObject = null;

  if (stream) {
    stream.getTracks().forEach(function(track) { track.stop(); });
    stream = null;
  }

  log("停止しました");
  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("resetBtn").style.display = "none";
}
function stopQrForError() {
  /*
   * 最初にロックする。
   * 停止直前にZXingのコールバックが重なっても再処理させない。
   */
  scanBusy = true;
  scanning = false;

  if (codeReader) {
    try {
      codeReader.reset();
    } catch (e) {
      console.log("codeReader reset error", e);
    }

    codeReader = null;
  }

  const video = document.getElementById("video");

  if (video) {
    try {
      video.pause();
    } catch (e) {}

    video.srcObject = null;
  }

  if (stream) {
    stream.getTracks().forEach(function(track) {
      track.stop();
    });

    stream = null;
  }

  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("resetBtn").style.display = "none";
}

function undoLastScan() {
  if (!lastScannedRecord) {
    log("取消できる読取がありません");
    return;
  }

  const undoRecord = lastScannedRecord;
  scannedSet.delete(undoRecord.key);
  scannedRecords = scannedRecords.filter(function(record) {
    return record.key !== undoRecord.key;
  });

  updateScanDisplay("取消しました\n✖ " + undoRecord.displayText);

  // REC系とまとめ送信系はまだ送信前なので、取消ログは送らない。
  // それ以外の即時送信モードだけ、従来どおり取消ログを送る。
  if (!FAST_MODES.includes(undoRecord.mode) && !REC_MODES.includes(undoRecord.mode)) {
    sendUndoToSheet(undoRecord.qrText, undoRecord);
  }

  log("取消しました");

  lastScannedRecord = scannedRecords.length > 0 ? scannedRecords[scannedRecords.length - 1] : null;
  lastScanned = lastScannedRecord ? lastScannedRecord.key : "";

  if (scannedRecords.length === 0) {
    document.getElementById("undoBtn").style.display = "none";
    document.getElementById("sendBatchBtn").style.display = "none";
    document.getElementById("recSendArea").style.display = "none";
  }
}

async function sendBatchToSheet() {
  if (scannedRecords.length === 0) {
    alert("送信するQRがありません");
    return;
  }

  if (!document.getElementById("user").value) {
    alert("担当者を選択してください");
    return;
  }

  if (!validateRecDateBeforeSend()) return;

  const modes = Array.from(new Set(scannedRecords.map(function(record) {
    return record.mode;
  })));

  if (modes.length !== 1) {
    alert("読取途中で処理区分が変更されています。\nいったん読取リセットして、同じ区分で読み直してください");
    return;
  }

  const mode = modes[0];

  if (REC_MODES.includes(mode)) {
    showRecSendArea(scannedRecords);
    return;
  }

  if (!FAST_MODES.includes(mode)) {
     alert("まとめて送信できない作業区分です");
     return;
}

  if (mode === "返却") {
    showReturnCaseArea(scannedRecords);
    return;
  }

  if (!confirm(mode + "を " + scannedRecords.length + "件まとめて送信します。よろしいですか？")) {
    return;
  }

  stopQr();
  document.getElementById("sendBatchBtn").disabled = true;
  startBatchLoading("まとめて送信中");

  try {
    const records = scannedRecords.map(buildBatchRecordData);
    const result = await sendBatchRecords(records);

    stopBatchLoading();
    document.getElementById("sendBatchBtn").disabled = false;

    if (!result.ok) {
      showBatchFailure(result);
      log("一部送信失敗あり");
      return;
    }
rememberSentLogIds(result);

/*
 * スプレッドシート反映後の最新状態を再取得する。
 */
await refreshInventoryAfterSend();

alert("まとめて送信完了\n" + result.successCount + "件");

    const sentItems = scannedRecords.map(function(record) {
      return record.qrText;
    });
    const sentMode = mode;

    resetScan();

    if (sentMode === "出庫") {
      showShipmentPhotoArea(sentItems);
    } else {
      log("送信完了。続けて読み取る場合は「カメラ起動」を押してください");
    }

  } catch (err) {
    handleBatchUnknownError(
      err,
      document.getElementById("sendBatchBtn"),
      "まとめて送信"
    );
  }
}

function createBatchId() {
  return "BATCH-" + new Date()
    .toISOString()
    .replace(/[-:.TZ]/g, "")
    .slice(0, 14) + "-" + Math.floor(Math.random() * 1000);
}
  
function buildBatchRecordData(record) {
  const data = {
    mode: record.mode,
    qr: record.qrText,
    user: record.user,
    location: record.location,
    recTarget: record.recTarget || "",
    recDate: record.recDate || "",

    recordType: record.recordType || "",
    managementType: record.managementType || "",
    displayName: record.displayName || ""
  };

  if (record.recordType === "quantity") {
    data.recordType = "quantity";
    data.itemCode = record.itemCode;
    data.displayName = record.displayName;
    data.quantity = record.quantity;
    data.unit = record.unit;
    data.category = record.category;
  }

  return data;
}

function sendBatchRecords(records, options) {
  const batchId = createBatchId();
  lastPendingSendId = batchId;

  records = records.map(function(record) {
    return Object.assign({}, record, {
      batchId: batchId,
      sendId: batchId
    });
  });

  const payload = {
    action: "batchWrite",
    batchId: batchId,
    sendId: batchId,
    records: records
  };

  if (options) Object.assign(payload, options);

  return fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  }).then(async function(response) {
    const text = await response.text();
    console.log("GAS RESPONSE:", text);

    try {
      const result = JSON.parse(text);
      if (!result.sendId) result.sendId = batchId;
      return result;
    } catch (err) {
      const unknownError = new Error(
        "送信結果の取得に失敗しました。スプレッドシートに反映済みの可能性があります。\n送信ID：" +
        batchId +
        "\n\n" +
        text.slice(0, 200)
      );
      unknownError.sendId = batchId;
      throw unknownError;
    }
  });
}

function handleBatchUnknownError(err, buttonElement, messagePrefix) {
  stopBatchLoading();

  if (buttonElement) {
    buttonElement.disabled = false;
  }

  if (lastPendingSendId) {
    lastSentLogIds = [lastPendingSendId];
    const cancelBtn = document.getElementById("cancelLastSendBtn");
    cancelBtn.style.display = "block";
    cancelBtn.disabled = false;
  }

  alert(messagePrefix + "結果不明\n" + err);
  log("送信結果不明。スプレッドシートを確認してください");
}
function showBatchFailure(result) {
  const results = Array.isArray(result.results) ? result.results : [];
  const failed = results.filter(function(item) {
    return !item.ok;
  }).map(function(item) {
    return (item.qr || "不明") + "：" + (item.message || "送信失敗");
  });

  const successCount = Number(result.successCount || 0);
  const failedCount = Number(result.failedCount || failed.length || 0);

  alert(
    "一部送信失敗\n" +
    "成功：" + successCount + "件\n" +
    "失敗：" + failedCount + "件" +
    (failed.length ? "\n\n" + failed.join("\n") : "\n\n" + (result.message || "送信に失敗しました"))
  );
}

function makeShipmentCollage(files, info) {
  return new Promise(async function(resolve) {
    const images = [];
    for (const file of files) {
      const img = await loadPhotoImage(file);
      images.push(img);
    }

    const cols = 3;
    const rows = 2;
    const cellW = 1100;
    const cellH = 825;
    const headerH = 180;

    const canvas = document.createElement("canvas");
    canvas.width = cols * cellW;
    canvas.height = rows * cellH + headerH;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#000000";
    ctx.font = "38px sans-serif";
    ctx.fillText("出庫写真", 20, 48);
    ctx.font = "28px sans-serif";
    ctx.fillText("日時：" + new Date().toLocaleString("ja-JP"), 20, 88);
    ctx.fillText("担当：" + (info.user || ""), 20, 128);

    const idText = (info.ids || []).join(" ");
    ctx.fillText("QR：" + idText.slice(0, 78), 520, 88);
    if (idText.length > 78) ctx.fillText(idText.slice(78, 156), 520, 128);

    for (let i = 0; i < 6; i++) {
      const x = (i % cols) * cellW;
      const y = Math.floor(i / cols) * cellH + headerH;
      ctx.strokeStyle = "#cccccc";
      ctx.strokeRect(x, y, cellW, cellH);
      ctx.fillStyle = "#f5f5f5";
      ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
      if (images[i]) drawImageCover(ctx, images[i], x, y, cellW, cellH);
      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.fillRect(x + 10, y + 10, 92, 44);
      ctx.fillStyle = "#ffffff";
      ctx.font = "30px sans-serif";
      ctx.fillText((i + 1) + "枚目", x + 18, y + 42);
    }
    resolve(canvas.toDataURL("image/jpeg", 0.92));
  });
}

function loadPhotoImage(file) {
  return new Promise(function(resolve) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() { resolve(img); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function drawImageCover(ctx, img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const nw = img.width * scale;
  const nh = img.height * scale;
  const nx = x + (w - nw) / 2;
  const ny = y + (h - nh) / 2;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.drawImage(img, nx, ny, nw, nh);
  ctx.restore();
}

function rememberSentLogIds(result) {
  lastSentLogIds = [];

  let sendId = "";

  if (result && result.sendId) {
    sendId = String(result.sendId).trim();
  }

  if (!sendId && result && Array.isArray(result.results)) {
    result.results.forEach(function(item) {
      if (!sendId && item.lastItem && item.lastItem.送信ID) {
        sendId = String(item.lastItem.送信ID).trim();
      }
    });
  }

  lastSentLogIds = sendId ? [sendId] : [];

  const btn = document.getElementById("cancelLastSendBtn");
  btn.style.display = sendId ? "block" : "none";
  btn.disabled = false;

  console.log("直前送信ID:", sendId);
}
async function cancelLastSend() {
  if (!lastSentLogIds || lastSentLogIds.length === 0) {
    alert("取消できる直前送信がありません");
    return;
  }

  const sendId = String(lastSentLogIds[0] || "").trim();

  if (!sendId) {
    alert("取消対象の送信IDが空です");
    return;
  }

  if (!confirm("直前送信を取消しますか？")) {
    return;
  }

  const btn = document.getElementById("cancelLastSendBtn");
  btn.disabled = true;
  log("直前送信を取消中...\n送信ID：" + sendId);

  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "cancelSend",
        sendId: sendId
      })
    });

    const text = await response.text();
    console.log("CANCEL RESPONSE:", text);

    let result;
    try {
      result = JSON.parse(text);
    } catch (parseErr) {
      throw new Error("取消結果の取得に失敗しました\n" + text.slice(0, 200));
    }

    if (!result.ok) {
      throw new Error(result.message || "取消に失敗しました");
    }

    alert("取消しました\n" + result.cancelCount + "件");
    lastSentLogIds = [];
    lastPendingSendId = "";
    btn.style.display = "none";
    btn.disabled = false;
    log("直前送信を取消しました");

  } catch (err) {
    btn.disabled = false;
    alert("取消エラー\n" + err);
    log("取消エラー");
  }
}
